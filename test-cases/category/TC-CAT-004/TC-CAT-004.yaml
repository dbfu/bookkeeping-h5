# TC-CAT-004 删除自定义分类
# 分类模块 - 测试用例

id: TC-CAT-004
title: 删除自定义分类
version: 1.0
priority: P0
module: category
tags: [delete, custom, P0]

created_at: 2026-05-05
updated_at: 2026-05-05
status: active

history:
  - version: 1.0
    date: 2026-05-05
    author: 测试团队
    change: 初始创建

preconditions:
  - 用户已登录
  - 存在自定义分类

steps:
  - action: 进入"分类管理"页面
    expected: 显示分类列表
  - action: 左滑目标自定义分类
    expected: 显示"编辑"和"删除"按钮
  - action: 点击"删除"按钮
    expected: 显示删除确认弹窗
  - action: 点击"确认删除"
    expected: |
      1. 显示删除成功提示
      2. 分类从列表中移除
      3. 已有账目处理提示

expected_results:
  - 分类删除成功
  - 分类列表正确更新
  - 历史账目处理正确

assertions:
  - type: ui
    description: 删除成功提示
    validate:
      - 显示"删除成功"提示
      - 分类列表中不再显示该分类
  - type: state
    description: 数据验证
    validate:
      - 数据库中分类记录已删除或标记删除
  - type: ui
    description: 历史账目处理
    validate:
      - 使用该分类的账目分类变为"其他支出/其他收入"

test_data:
  - case: 删除无账目分类
    category:
      name: "测试分类"
      has_records: false
  - case: 删除有账目分类
    category:
      name: "宠物开销"
      has_records: true
      record_count: 5

error_cases:
  - case: 删除预设分类
    action: 尝试删除预设分类
    expected: 提示"预设分类不可删除"或删除按钮不可点击
  - case: 取消删除
    action: 点击删除后点击取消
    expected: 弹窗关闭，分类保留

notes: |
  - 预设分类不可删除
  - 删除分类时需处理已有账目
  - 已有账目可迁移到"其他"分类
  - 删除需二次确认